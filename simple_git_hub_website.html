<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meine GitHub Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
    }

    header {
      background: #161b22;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      color: #58a6ff;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      background: #21262d;
      padding: 10px;
    }

    nav a {
      color: #c9d1d9;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #58a6ff;
    }

    .container {
      padding: 40px;
      text-align: center;
    }

    .card {
      background: #161b22;
      padding: 20px;
      margin: 20px auto;
      border-radius: 10px;
      max-width: 500px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    footer {
      background: #161b22;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Meine Website</h1>
    <p>Gehostet mit GitHub Pages 🚀</p>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">Projekte</a>
    <a href="#">Kontakt</a>
  </nav>

  <div class="container">
    <div class="card">
      <h2>Willkommen 👋</h2>
      <p>Das ist meine erste Website mit GitHub Pages.</p>
    </div>

    <div class="card">
      <h2>Meine Projekte</h2>
      <p>Hier kannst du später deine Projekte hinzufügen.</p>
    </div>
  </div>

  <footer>
    <p>© 2026 Meine Website</p>
  </footer>

</body>
</html>
